<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Hand Particles - Mobile Optimized</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: sans-serif; touch-action: none; }
        video { display: none; } 
        #canvas-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        #loading {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: #00ffcc; font-size: 18px; z-index: 10; pointer-events: none;
            text-align: center; width: 80%;
        }
        #ui {
            position: absolute; bottom: 10px; left: 10px; right: 10px; color: white; z-index: 10;
            background: rgba(0,0,0,0.6); padding: 10px; border-radius: 8px; pointer-events: none;
            font-size: 12px; display: flex; flex-wrap: wrap; justify-content: space-around;
        }
        .instruction { margin: 2px 5px; }
        b { color: #00ffcc; }
        /* Error message style */
        #error-msg {
            display: none; position: absolute; top: 10px; left: 0; width: 100%; 
            background: red; color: white; text-align: center; padding: 10px; z-index: 20;
        }
    </style>
</head>
<body>

    <div id="error-msg">Camera Error: Please allow permissions or use HTTPS.</div>

    <div id="loading">
        Starting Camera & AI...<br>
        <span style="font-size:14px; color:#aaa;">(Use in well-lit room)</span>
    </div>
    
    <div id="ui">
        <div class="instruction">✋ <b>Move</b></div>
        <div class="instruction">👌 <b>Pinch:</b> Zoom</div>
        <div class="instruction">✊ <b>Fist:</b> Change Shape</div>
        <div class="instruction" id="status" style="width:100%; text-align:center; margin-top:5px; border-top:1px solid #444; padding-top:3px;">Shape: Sphere</div>
    </div>

    <div id="canvas-container"></div>
    
    <!-- playsinline is crucial for iOS -->
    <video id="input-video" playsinline></video>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

    <script>
        // --- MOBILE DETECTION & CONFIG ---
        const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
        
        // Reduce particles on mobile for performance
        const PARTICLE_COUNT = isMobile ? 1200 : 3000;
        const PARTICLE_SIZE = isMobile ? 0.25 : 0.15;
        
        const SHAPES = ['Sphere', 'Heart', 'Saturn', 'Flower', 'Helix'];
        let currentShapeIndex = 0;

        // --- THREE.JS SETUP ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x000000, 0.02);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 20;

        const renderer = new THREE.WebGLRenderer({ antialias: !isMobile, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        container.appendChild(renderer.domElement);

        // --- PARTICLE SYSTEM ---
        const geometry = new THREE.BufferGeometry();
        const positions = new Float32Array(PARTICLE_COUNT * 3);
        const targets = new Float32Array(PARTICLE_COUNT * 3);
        const colors = new Float32Array(PARTICLE_COUNT * 3);
        const colorObj = new THREE.Color();

        for (let i = 0; i < PARTICLE_COUNT; i++) {
            positions[i * 3] = 0; positions[i * 3 + 1] = 0; positions[i * 3 + 2] = 0;
            colorObj.setHSL(Math.random(), 0.7, 0.5);
            colors[i * 3] = colorObj.r; colors[i * 3 + 1] = colorObj.g; colors[i * 3 + 2] = colorObj.b;
        }

        geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

        const getTexture = () => {
            const canvas = document.createElement('canvas');
            canvas.width = 32; canvas.height = 32;
            const ctx = canvas.getContext('2d');
            const grad = ctx.createRadialGradient(16, 16, 0, 16, 16, 16);
            grad.addColorStop(0, 'rgba(255,255,255,1)');
            grad.addColorStop(1, 'rgba(255,255,255,0)');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, 32, 32);
            return new THREE.Texture(canvas);
        };
        const tex = getTexture();
        tex.needsUpdate = true;

        const material = new THREE.PointsMaterial({
            size: PARTICLE_SIZE,
            map: tex,
            vertexColors: true,
            blending: THREE.AdditiveBlending,
            depthWrite: false,
            transparent: true
        });

        const particleSystem = new THREE.Points(geometry, material);
        scene.add(particleSystem);

        // --- MATH SHAPES (Same as before) ---
        function getPointOnSphere(i) {
            const phi = Math.acos(-1 + (2 * i) / PARTICLE_COUNT);
            const theta = Math.sqrt(PARTICLE_COUNT * Math.PI) * phi;
            const r = 8;
            return { x: r * Math.cos(theta) * Math.sin(phi), y: r * Math.sin(theta) * Math.sin(phi), z: r * Math.cos(phi) };
        }
        function getPointOnHeart(i) {
            const t = (i / PARTICLE_COUNT) * Math.PI * 2;
            const r = 0.5; 
            const x = 16 * Math.pow(Math.sin(t), 3);
            const y = 13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t);
            return { x: x * r, y: y * r, z: (Math.random() - 0.5) * 4 };
        }
        function getPointOnSaturn(i) {
            const r = 4;
            if (i < PARTICLE_COUNT * 0.7) {
                const phi = Math.acos(-1 + (2 * i) / (PARTICLE_COUNT * 0.7));
                const theta = Math.sqrt((PARTICLE_COUNT * 0.7) * Math.PI) * phi;
                return { x: r * Math.cos(theta) * Math.sin(phi), y: r * Math.sin(theta) * Math.sin(phi), z: r * Math.cos(phi) };
            } else {
                const angle = (i / (PARTICLE_COUNT * 0.3)) * Math.PI * 10;
                const radius = 6 + Math.random() * 4;
                return { x: radius * Math.cos(angle), y: (Math.random() - 0.5) * 0.5, z: radius * Math.sin(angle) };
            }
        }
        function getPointOnFlower(i) {
            const angle = (i / PARTICLE_COUNT) * Math.PI * 20;
            const r = 8 * Math.cos(4 * angle * 0.1) + 2; 
            return { x: r * Math.cos(angle), y: r * Math.sin(angle), z: (Math.random() - 0.5) * 5 };
        }
        function getPointOnHelix(i) {
            const t = i / PARTICLE_COUNT * 20;
            return { x: Math.cos(t) * 4, y: (i / PARTICLE_COUNT - 0.5) * 15, z: Math.sin(t) * 4 };
        }

        function updateTargets(shapeName) {
            for (let i = 0; i < PARTICLE_COUNT; i++) {
                let p;
                if (shapeName === 'Sphere') p = getPointOnSphere(i);
                else if (shapeName === 'Heart') p = getPointOnHeart(i);
                else if (shapeName === 'Saturn') p = getPointOnSaturn(i);
                else if (shapeName === 'Flower') p = getPointOnFlower(i);
                else if (shapeName === 'Helix') p = getPointOnHelix(i);
                targets[i * 3] = p.x; targets[i * 3 + 1] = p.y; targets[i * 3 + 2] = p.z;
            }
        }
        updateTargets(SHAPES[currentShapeIndex]);

        // --- INTERACTION ---
        let handPosition = new THREE.Vector3(0, 0, 0);
        let pinchScale = 1.0;
        let isFist = false;
        let wasFist = false;

        // --- MEDIAPIPE ---
        const videoElement = document.getElementById('input-video');
        
        function onResults(results) {
            document.getElementById('loading').style.display = 'none';
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const landmarks = results.multiHandLandmarks[0];
                
                // Optimized Mapping for Portrait Mode
                // Mobile cameras often crop the sides in portrait mode, so we expand the range
                let xMult = isMobile ? 35 : 25; 
                let yMult = isMobile ? 25 : 20;

                const x = (0.5 - landmarks[9].x) * xMult;
                const y = (0.5 - landmarks[9].y) * yMult;
                
                handPosition.lerp(new THREE.Vector3(x, y, 0), 0.1);

                // Pinch
                const d = Math.sqrt(Math.pow(landmarks[4].x - landmarks[8].x, 2) + Math.pow(landmarks[4].y - landmarks[8].y, 2));
                const targetScale = 0.5 + (d * 5); 
                pinchScale = targetScale;

                // Fist
                isFist = (landmarks[8].y > landmarks[6].y) && (landmarks[20].y > landmarks[18].y);
            } else {
                handPosition.lerp(new THREE.Vector3(0,0,0), 0.05);
                pinchScale = 1.0;
                isFist = false;
            }
        }

        const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
        
        hands.setOptions({
            maxNumHands: 1,
            modelComplexity: isMobile ? 0 : 1, // '0' is faster for mobile (Lite model)
            minDetectionConfidence: 0.5,
            minTrackingConfidence: 0.5
        });
        hands.onResults(onResults);

        // --- CAMERA START ---
        const cameraUtils = new Camera(videoElement, {
            onFrame: async () => { await hands.send({image: videoElement}); },
            width: isMobile ? 480 : 640,  // Lower resolution for better mobile fps
            height: isMobile ? 360 : 480,
            facingMode: 'user' // IMPORTANT: Use front camera
        });
        
        cameraUtils.start().catch(err => {
            console.error(err);
            document.getElementById('error-msg').style.display = 'block';
            document.getElementById('loading').style.display = 'none';
        });

        // --- ANIMATION ---
        const clock = new THREE.Clock();
        function animate() {
            requestAnimationFrame(animate);
            const time = clock.getElapsedTime();
            
            if (wasFist && !isFist) {
                currentShapeIndex = (currentShapeIndex + 1) % SHAPES.length;
                updateTargets(SHAPES[currentShapeIndex]);
                document.getElementById('status').innerHTML = "Shape: " + SHAPES[currentShapeIndex];
                material.size = PARTICLE_SIZE * 2; 
            } else {
                material.size = THREE.MathUtils.lerp(material.size, PARTICLE_SIZE, 0.1);
            }
            wasFist = isFist;

            const positionsArray = geometry.attributes.position.array;
            const colorsArray = geometry.attributes.color.array;
            let lerpSpeed = isFist ? 0.15 : 0.05;
            let collapseFactor = isFist ? 0.1 : 1.0; 
            const hueBase = (handPosition.x + 10) / 20; 

            for (let i = 0; i < PARTICLE_COUNT; i++) {
                const ix = i * 3, iy = i * 3 + 1, iz = i * 3 + 2;

                let tx = targets[ix] * pinchScale * collapseFactor + handPosition.x;
                let ty = targets[iy] * pinchScale * collapseFactor + handPosition.y;
                let tz = targets[iz] * pinchScale * collapseFactor + handPosition.z;

                if (!isFist) {
                    tx += Math.sin(time * 2 + i) * 0.1;
                    ty += Math.cos(time * 1.5 + i) * 0.1;
                }

                positionsArray[ix] += (tx - positionsArray[ix]) * lerpSpeed;
                positionsArray[iy] += (ty - positionsArray[iy]) * lerpSpeed;
                positionsArray[iz] += (tz - positionsArray[iz]) * lerpSpeed;

                if (isFist) colorObj.setHSL(0.1, 1.0, 0.8);
                else colorObj.setHSL((hueBase + (positionsArray[iy] * 0.05)) % 1.0, 0.8, 0.6);
                
                colorsArray[ix] = colorObj.r; colorsArray[iy] = colorObj.g; colorsArray[iz] = colorObj.b;
            }

            geometry.attributes.position.needsUpdate = true;
            geometry.attributes.color.needsUpdate = true;
            particleSystem.rotation.y = time * 0.1;

            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
